<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Messages</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      body { 
        background: #130f1a; 
        color: white; 
        font-family: 'Inter', system-ui, -apple-system, sans-serif; 
        padding: 2rem; 
      }
      h1 { color: #7a1ffb; }
      a { color: #8a3ffc; text-decoration: none; font-weight: bold; }
      a:hover { color: #a46dff; }
      table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 2rem; 
        background: #1c1825;
        border-radius: 8px;
        overflow: hidden;
      }
      th, td { 
        border-bottom: 1px solid rgba(255,255,255,0.1); 
        padding: 1rem; 
        text-align: left; 
      }
      th { 
        background: rgba(122,31,251,0.2); 
        color: #fff; 
        font-weight: 600;
        letter-spacing: 1px;
      }
      button.delete-btn { 
        background: #ea4c89; 
        color: white; 
        border: none; 
        padding: 0.5rem 1rem; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: 600;
        transition: background 0.3s;
      }
      button.delete-btn:hover { background: #d03c78; }
      .message-cell { max-width: 300px; word-wrap: break-word; }
    </style>
  </head>
  <body>
    <h1><i class="fa-solid fa-lock"></i> Admin Panel - Contact Messages</h1>
    <a href="/">&larr; Back to Portfolio Home</a>
    
    <table id="messagesTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Message</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="messages-body">
        <tr><td colspan="6" style="text-align: center;">Loading messages...</td></tr>
      </tbody>
    </table>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
